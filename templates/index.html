<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080b1a;
            --bg2: #0c1028;
            --bg3: #111638;
            --glass: rgba(12, 16, 40, 0.65);
            --glass-border: rgba(59, 130, 246, 0.15);
            --border: #1a1f3d;
            --text1: #e2e8f0;
            --text2: #94a3b8;
            --text3: #475569;
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --blue-glow: rgba(59, 130, 246, 0.25);
            --blue-glow2: rgba(59, 130, 246, 0.5);
            --orange: #f97316;
            --orange-light: #fb923c;
            --orange-glow: rgba(249, 115, 22, 0.25);
            --orange-glow2: rgba(249, 115, 22, 0.5);
            --user-bubble: rgba(59, 130, 246, 0.12);
            --user-bubble-border: rgba(59, 130, 246, 0.25);
            --ai-bubble: rgba(20, 24, 51, 0.8);
            --ai-bubble-border: rgba(30, 35, 70, 0.8);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text1);
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
            width: 120%; height: 60%;
            background: radial-gradient(ellipse at center, rgba(59,130,246,0.06) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -10%; left: 50%; transform: translateX(-50%);
            width: 80%; height: 40%;
            background: radial-gradient(ellipse at center, rgba(249,115,22,0.04) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        /* ---- MAIN CARD ---- */
        .app-card {
            position: relative; z-index: 1;
            width: 95vw; max-width: 680px; height: 92vh; height: 92dvh;
            display: flex; flex-direction: column;
            background: var(--glass);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(59,130,246,0.08), 0 0 120px rgba(249,115,22,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
            overflow: hidden;
        }

        /* ---- HEADER ---- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(8, 11, 26, 0.5);
            flex-shrink: 0; position: relative;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            object-fit: cover; border: 1px solid var(--glass-border);
        }
        .header-avatar-fallback {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--blue), var(--orange));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .header-title {
            font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--text1) 0%, var(--blue-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
        .header-bolt {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--orange), #ea580c);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; transition: all 0.2s; border: none; color: white;
        }
        .header-bolt:hover { box-shadow: 0 0 20px var(--orange-glow2); transform: scale(1.05); }

        /* ---- MESSAGES ---- */
        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: msgIn 0.3s ease; }
        .msg-row.ai { align-self: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .msg-avatar { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; flex-shrink: 0; margin-top: 2px; }
        .msg-avatar-fallback {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--blue), var(--orange));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }

        .msg-body { display: flex; flex-direction: column; gap: 4px; }
        .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.55; word-wrap: break-word; }
        .msg-row.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--ai-bubble-border); border-top-left-radius: 4px; }
        .msg-row.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--user-bubble-border); border-top-right-radius: 4px; }
        .msg-meta { font-size: 0.68rem; color: var(--text3); padding: 0 4px; }
        .msg-row.user .msg-meta { text-align: right; }

        /* Audio bars on AI messages */
        .msg-audio-btn {
            display: inline-flex; align-items: center; gap: 2px;
            margin-left: 8px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; vertical-align: middle;
        }
        .msg-audio-btn:hover { opacity: 1; }
        .msg-audio-btn .bar { width: 3px; border-radius: 2px; background: var(--orange); display: inline-block; }
        .msg-audio-btn .bar:nth-child(1) { height: 8px; }
        .msg-audio-btn .bar:nth-child(2) { height: 14px; }
        .msg-audio-btn .bar:nth-child(3) { height: 10px; }
        .msg-audio-btn .bar:nth-child(4) { height: 16px; }
        .msg-audio-btn .bar:nth-child(5) { height: 8px; }
        .msg-audio-btn.playing .bar { animation: barPulse 0.5s ease-in-out infinite alternate; }
        .msg-audio-btn.playing .bar:nth-child(2) { animation-delay: 0.08s; }
        .msg-audio-btn.playing .bar:nth-child(3) { animation-delay: 0.16s; }
        .msg-audio-btn.playing .bar:nth-child(4) { animation-delay: 0.24s; }
        .msg-audio-btn.playing .bar:nth-child(5) { animation-delay: 0.32s; }
        @keyframes barPulse { from { transform: scaleY(0.5); } to { transform: scaleY(1.3); } }

        /* Typing indicator */
        .typing-row { display: flex; gap: 10px; align-self: flex-start; max-width: 85%; }
        .typing-dots {
            display: flex; gap: 4px; padding: 12px 16px;
            background: var(--ai-bubble); border: 1px solid var(--ai-bubble-border);
            border-radius: 14px; border-top-left-radius: 4px;
        }
        .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); animation: dotBounce 1.4s ease-in-out infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotBounce { 0%,60%,100% { opacity:0.3; transform:translateY(0); } 30% { opacity:1; transform:translateY(-6px); } }

        /* ---- CENTER LOGO ---- */
        .center-logo {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 0; flex-shrink: 0; pointer-events: none; opacity: 0.9;
            transition: opacity 0.4s, max-height 0.4s;
            max-height: 180px; overflow: hidden;
        }
        .center-logo.hidden { opacity: 0; max-height: 0; padding: 0; }
        .center-logo img {
            max-height: 140px; width: auto;
            filter: drop-shadow(0 0 30px rgba(59,130,246,0.2)) drop-shadow(0 0 60px rgba(249,115,22,0.15));
        }
        .logo-fallback { font-size: 64px; filter: drop-shadow(0 0 20px rgba(249,115,22,0.4)); }

        /* ---- INPUT BAR ---- */
        .input-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid var(--glass-border);
            background: rgba(8, 11, 26, 0.6);
            flex-shrink: 0;
        }
        .mic-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: transparent; color: var(--blue); font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .mic-btn:hover { background: rgba(59,130,246,0.1); }
        .mic-btn.recording { color: var(--orange); background: rgba(249,115,22,0.15); animation: micPulse 1s ease-in-out infinite; }
        @keyframes micPulse { 0% { box-shadow: 0 0 0 0 rgba(249,115,22,0.4); } 100% { box-shadow: 0 0 0 12px rgba(249,115,22,0); } }
        .mic-btn.processing { color: var(--blue-light); animation: micSpin 1s linear infinite; }
        @keyframes micSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .text-input {
            flex: 1; background: rgba(17, 22, 56, 0.6); border: 1px solid var(--border);
            color: var(--text1); padding: 10px 14px; border-radius: 20px;
            font-size: 0.9rem; font-family: inherit; transition: all 0.2s; outline: none;
        }
        .text-input:focus { border-color: rgba(59,130,246,0.4); box-shadow: 0 0 12px var(--blue-glow); }
        .text-input::placeholder { color: var(--text3); }

        .send-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: transparent; color: var(--text3); font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { color: var(--blue); background: rgba(59,130,246,0.1); }

        /* ---- CLEAR MENU ---- */
        .clear-menu {
            display: none; position: absolute; top: 60px; right: 16px;
            background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
            padding: 6px; z-index: 10; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .clear-menu.show { display: block; }
        .clear-menu button {
            display: block; width: 100%; padding: 8px 16px;
            background: transparent; border: none; color: var(--text2);
            font-size: 0.82rem; cursor: pointer; border-radius: 6px; text-align: left; font-family: inherit;
        }
        .clear-menu button:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

        @media (max-width: 700px) {
            .app-card { width: 100vw; height: 100vh; height: 100dvh; border-radius: 0; border: none; }
            .center-logo img { max-height: 100px; }
            .logo-fallback { font-size: 48px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <div class="header-left">
            <img src="/static/img/avatar.png" class="header-avatar"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="header-avatar-fallback" style="display:none">🔥</div>
            <div>
                <div class="header-title">{{ app_name }}</div>
                <div class="header-status"><span class="status-dot"></span> Online</div>
            </div>
        </div>
        <button class="header-bolt" onclick="toggleMenu()" title="Options">⚡</button>
        <div class="clear-menu" id="clearMenu">
            <button onclick="clearConversation(); toggleMenu();">🗑 Clear conversation</button>
        </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="center-logo" id="centerLogo">
        <img src="/static/img/logo.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="logo-fallback" style="display:none">🔥</div>
    </div>

    <div class="input-bar">
        <button class="mic-btn" id="micBtn"
                onmousedown="startRecording()" onmouseup="stopRecording()"
                ontouchstart="startRecording()" ontouchend="stopRecording()"
                title="Hold to speak">🎤</button>
        <input type="text" class="text-input" id="textInput"
               placeholder="Type a message or tap the mic to talk..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
</div>

<script>
// ---- STATE ----
let socket = null, audioContext = null, isRecording = false, mediaRecorder = null;
let audioChunks = [], audioQueue = [], isPlayingAudio = false;

// ---- INIT ----
document.addEventListener('DOMContentLoaded', () => {
    initSocket();
    loadConversation();
    document.getElementById('textInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
});

function initSocket() {
    socket = io();
    socket.on('transcription', d => { addMessage('user', d.text); saveConversation(); });
    socket.on('ai_response_text', d => { addMessage('ai', d.text); saveConversation(); setMicState('idle'); });
    socket.on('audio_chunk', d => playAudioChunk(d.data));
    socket.on('audio_end', () => setMicState('idle'));
    socket.on('voice_error', d => { console.error(d.error); setMicState('idle'); });
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function timeStr() { return new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }

function checkLogo() {
    const m = document.getElementById('messages');
    document.getElementById('centerLogo').classList.toggle('hidden', m.children.length > 0);
}

// ---- MESSAGES ----
function aiAvatar() {
    return `<img src="/static/img/avatar.png" class="msg-avatar" onerror="this.outerHTML='<div class=\\'msg-avatar-fallback\\'>🔥</div>'">`;
}
function userAvatar() {
    return `<div class="msg-avatar-fallback" style="background:linear-gradient(135deg,#6366f1,#3b82f6)">👤</div>`;
}
function audioBars() {
    return `<span class="msg-audio-btn" onclick="playTTS(this)" title="Play audio"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>`;
}

function addMessage(role, text) {
    const c = document.getElementById('messages');
    const r = document.createElement('div');
    r.className = `msg-row ${role}`;
    const avatar = role === 'ai' ? aiAvatar() : userAvatar();
    const bars = role === 'ai' ? audioBars() : '';
    r.innerHTML = `${avatar}<div class="msg-body"><div class="msg-bubble">${escapeHtml(text)}${bars}</div><div class="msg-meta">${timeStr()}</div></div>`;
    c.appendChild(r);
    c.scrollTop = c.scrollHeight;
    checkLogo();
}

function addTyping() {
    const c = document.getElementById('messages');
    const r = document.createElement('div');
    r.className = 'typing-row'; r.id = 'typingRow';
    r.innerHTML = `${aiAvatar()}<div class="typing-dots"><span></span><span></span><span></span></div>`;
    c.appendChild(r);
    c.scrollTop = c.scrollHeight;
}
function removeTyping() { const e = document.getElementById('typingRow'); if (e) e.remove(); }

// Streaming
function startStream() {
    removeTyping();
    const c = document.getElementById('messages');
    const r = document.createElement('div');
    r.className = 'msg-row ai';
    r.innerHTML = `${aiAvatar()}<div class="msg-body"><div class="msg-bubble" id="streamBubble"></div><div class="msg-meta">${timeStr()}</div></div>`;
    c.appendChild(r);
    c.scrollTop = c.scrollHeight;
    checkLogo();
}
function appendStream(t) {
    const b = document.getElementById('streamBubble');
    if (b) { b.textContent += t; document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; }
}
function endStream() {
    const b = document.getElementById('streamBubble');
    if (b) { b.innerHTML = escapeHtml(b.textContent) + audioBars(); b.removeAttribute('id'); }
}

// ---- CHAT ----
function sendMessage() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    addTyping();

    fetch('/api/chat', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ message: text })
    }).then(res => {
        const reader = res.body.getReader(), decoder = new TextDecoder();
        let started = false;
        function read() {
            reader.read().then(({ done, value }) => {
                if (done) { if (!started) removeTyping(); endStream(); saveConversation(); return; }
                for (const line of decoder.decode(value).split('\n')) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const d = JSON.parse(line.slice(6));
                        if (d.text) { if (!started) { startStream(); started = true; } appendStream(d.text); }
                        if (d.error) { removeTyping(); addMessage('ai', '[Error: '+d.error+']'); }
                    } catch(e) {}
                }
                read();
            });
        }
        read();
    }).catch(() => { removeTyping(); addMessage('ai', '[Connection error]'); });
}

// ---- VOICE ----
async function startRecording() {
    if (isRecording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
        mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = sendVoice;
        mediaRecorder.start();
        isRecording = true;
        setMicState('recording');
        socket.emit('voice_start');
    } catch(e) { console.error('Mic error:', e); }
}
function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    mediaRecorder.stop();
    isRecording = false;
    setMicState('processing');
}
function sendVoice() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const r = new FileReader();
    r.onloadend = () => socket.emit('voice_data', { audio: r.result.split(',')[1] });
    r.readAsDataURL(blob);
}
function setMicState(s) {
    const b = document.getElementById('micBtn');
    b.classList.remove('recording','processing');
    if (s === 'recording') b.classList.add('recording');
    if (s === 'processing') b.classList.add('processing');
}

// ---- TTS ----
function playTTS(el) {
    const bubble = el.closest('.msg-bubble');
    const text = bubble.childNodes[0].textContent.trim();
    if (!text) return;
    el.classList.add('playing');
    fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) })
        .then(r => r.blob()).then(blob => {
            const audio = new Audio(URL.createObjectURL(blob));
            audio.onended = () => el.classList.remove('playing');
            audio.onerror = () => el.classList.remove('playing');
            audio.play();
        }).catch(() => el.classList.remove('playing'));
}

// WebSocket audio
function playAudioChunk(b64) { audioQueue.push(b64); if (!isPlayingAudio) playNext(); }
function playNext() {
    if (!audioQueue.length) { isPlayingAudio = false; return; }
    isPlayingAudio = true;
    const bytes = Uint8Array.from(atob(audioQueue.shift()), c => c.charCodeAt(0));
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioContext.decodeAudioData(bytes.buffer, buf => {
        const src = audioContext.createBufferSource();
        src.buffer = buf; src.connect(audioContext.destination);
        src.onended = playNext;
        src.start(0);
    }, () => playNext());
}

// ---- PERSISTENCE ----
function saveConversation() {
    const msgs = [];
    document.querySelectorAll('.msg-row').forEach(r => {
        const role = r.classList.contains('user') ? 'user' : 'assistant';
        const bubble = r.querySelector('.msg-bubble');
        if (bubble) msgs.push({ role, content: bubble.childNodes[0].textContent.trim() });
    });
    localStorage.setItem('echowix_history', JSON.stringify(msgs.slice(-40)));
}
function loadConversation() {
    try {
        const saved = JSON.parse(localStorage.getItem('echowix_history') || '[]');
        for (const m of saved) addMessage(m.role === 'assistant' ? 'ai' : 'user', m.content);
    } catch(e) {}
}
function clearConversation() {
    localStorage.removeItem('echowix_history');
    document.getElementById('messages').innerHTML = '';
    checkLogo();
    // Clear server-side history too
    fetch('/api/clear', { method: 'POST' }).catch(() => {});
}

// ---- MENU ----
function toggleMenu() { document.getElementById('clearMenu').classList.toggle('show'); }
document.addEventListener('click', e => {
    if (!e.target.closest('.header-bolt') && !e.target.closest('.clear-menu'))
        document.getElementById('clearMenu').classList.remove('show');
});
</script>
</body>
</html>
