<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="apple-touch-icon" href="/static/img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#06081a;--bg2:#0a0e2a;--bg3:#101540;--glass:rgba(10,14,42,0.7);--glass-border:rgba(59,130,246,0.12);--glass-border2:rgba(99,102,241,0.15);--border:#161b3d;--text1:#e2e8f0;--text2:#94a3b8;--text3:#475569;--blue:#3b82f6;--blue-light:#60a5fa;--blue-glow:rgba(59,130,246,0.3);--orange:#f97316;--orange-light:#fb923c;--orange-glow:rgba(249,115,22,0.3);--red:#ef4444;--green:#22c55e;--user-bubble:rgba(59,130,246,0.1);--user-border:rgba(59,130,246,0.2);--ai-bubble:rgba(16,21,64,0.7);--ai-border:rgba(30,38,80,0.6)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;top:-30%;left:40%;width:80%;height:60%;background:radial-gradient(ellipse,rgba(59,130,246,0.07) 0%,transparent 65%);pointer-events:none}
        body::after{content:'';position:fixed;bottom:-20%;right:30%;width:70%;height:50%;background:radial-gradient(ellipse,rgba(249,115,22,0.05) 0%,transparent 65%);pointer-events:none}
        .app-wrap{position:relative;z-index:1;display:flex;align-items:center;gap:0;width:92vw;max-width:1100px;height:80vh;height:80dvh}
        .logo-panel{flex-shrink:0;width:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;position:relative;overflow:hidden}
        .logo-panel img.lp-logo{width:700px;height:auto;opacity:0.4;pointer-events:none;max-width:none}
        .logo-panel::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(249,115,22,0.08) 0%,transparent 65%);pointer-events:none}
        .app-card{flex:1;height:100%;display:flex;flex-direction:column;background:var(--glass);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 0 80px rgba(59,130,246,0.06),0 0 160px rgba(249,115,22,0.03),inset 0 1px 0 rgba(255,255,255,0.03);overflow:hidden;position:relative}
        .header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--glass-border);background:rgba(6,8,26,0.4);flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:10px}
        .header-avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid rgba(99,102,241,0.25);box-shadow:0 0 16px rgba(99,102,241,0.15)}
        .hdr-av-fb{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
        .header-info .title{font-size:1.4rem;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--text1),var(--blue-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-info .sub{font-size:1.06rem;font-weight:700;color:var(--text3);display:flex;align-items:center;gap:5px;margin-top:2px}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.5)}
        .header-right{display:flex;gap:6px;align-items:center}
        .hdr-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.03)}
        .hdr-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .hdr-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.05);border-color:rgba(255,255,255,0.1)}
        .hdr-btn img{width:70px;height:70px;object-fit:cover;border-radius:50%}
        .hdr-btn-call{width:70px;height:70px}
        .hdr-btn-call img{width:70px;height:70px}
        .messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;position:relative;z-index:1}
        .messages::-webkit-scrollbar{width:3px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .msg-row{display:flex;gap:10px;max-width:75%;animation:mi 0.3s ease}
        .msg-row.ai{align-self:flex-start}.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
        @keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg-av{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px;border:1.5px solid rgba(255,255,255,0.08);box-shadow:0 0 10px rgba(0,0,0,0.3)}
        .msg-av-fb{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px}
        .msg-body{display:flex;flex-direction:column;gap:3px}
        .msg-bubble{padding:10px 14px;border-radius:16px;font-size:0.88rem;line-height:1.55;word-wrap:break-word}
        .msg-row.ai .msg-bubble{background:var(--ai-bubble);border:1px solid var(--ai-border);border-top-left-radius:4px}
        .msg-row.user .msg-bubble{background:var(--user-bubble);border:1px solid var(--user-border);border-top-right-radius:4px}
        .msg-meta{font-size:0.65rem;color:var(--text3);padding:0 4px}.msg-row.user .msg-meta{text-align:right}
        .abtn{display:inline-flex;align-items:center;gap:2px;margin-left:8px;cursor:pointer;opacity:0.35;transition:opacity 0.2s;vertical-align:middle}
        .abtn:hover{opacity:1}.abtn .b{width:2.5px;border-radius:2px;background:var(--orange);display:inline-block}
        .abtn .b:nth-child(1){height:7px}.abtn .b:nth-child(2){height:12px}.abtn .b:nth-child(3){height:9px}.abtn .b:nth-child(4){height:14px}.abtn .b:nth-child(5){height:7px}
        .abtn.playing .b{animation:bp .5s ease-in-out infinite alternate}
        .abtn.playing .b:nth-child(2){animation-delay:.08s}.abtn.playing .b:nth-child(3){animation-delay:.16s}.abtn.playing .b:nth-child(4){animation-delay:.24s}.abtn.playing .b:nth-child(5){animation-delay:.32s}
        @keyframes bp{from{transform:scaleY(.5)}to{transform:scaleY(1.3)}}
        .typing-row{display:flex;gap:10px;align-self:flex-start}
        .typing-dots{display:flex;gap:4px;padding:10px 14px;background:var(--ai-bubble);border:1px solid var(--ai-border);border-radius:16px;border-top-left-radius:4px}
        .typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:db 1.4s ease-in-out infinite}
        .typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
        @keyframes db{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-5px)}}
        .input-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--glass-border);background:rgba(6,8,26,0.5);flex-shrink:0}
        .text-input{flex:1;background:rgba(16,21,64,0.4);border:1px solid var(--border);color:var(--text1);padding:10px 16px;border-radius:24px;font-size:0.88rem;font-family:inherit;outline:none;transition:all 0.2s}
        .text-input:focus{border-color:rgba(59,130,246,0.3);box-shadow:0 0 10px rgba(59,130,246,0.12)}
        .text-input::placeholder{color:var(--text3)}
        .attach-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:1.2rem;color:var(--text3)}
        .attach-btn:hover{background:rgba(255,255,255,0.08);color:var(--text1)}
        .img-preview{position:relative;display:inline-block;margin:4px 8px;max-height:100px}
        .img-preview img{max-height:100px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform 0.2s}
        .img-preview img:hover{transform:scale(1.05)}
        .img-preview .remove-img{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1}
        .send-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;overflow:hidden}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(249,115,22,0.3)}
        .send-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .call-overlay{display:none;position:absolute;inset:0;z-index:20;background:rgba(6,8,26,0.94);backdrop-filter:blur(24px);flex-direction:column;align-items:center;justify-content:center;gap:20px}
        .call-overlay.active{display:flex}
        .call-avatar{width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid var(--blue);box-shadow:0 0 40px var(--blue-glow)}
        .call-av-fb{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:44px;border:2px solid var(--blue);box-shadow:0 0 40px var(--blue-glow)}
        .call-name{font-size:1.4rem;font-weight:700}.call-status{font-size:0.82rem;color:var(--text2)}
        .call-status.listening{color:var(--green)}.call-status.thinking{color:var(--blue-light)}.call-status.speaking{color:var(--orange)}
        .call-timer{font-size:0.75rem;color:var(--text3);font-variant-numeric:tabular-nums}
        .caw{position:relative}.caw::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;transition:all .3s}
        .caw.listening::after{border-color:var(--green);box-shadow:0 0 20px rgba(34,197,94,0.3)}
        .caw.speaking::after{border-color:var(--orange);box-shadow:0 0 20px var(--orange-glow);animation:cp 1s ease-in-out infinite}
        .caw.thinking::after{border-color:var(--blue);box-shadow:0 0 20px var(--blue-glow)}
        @keyframes cp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .call-transcript{max-width:80%;text-align:center;font-size:0.82rem;color:var(--text2);min-height:2.5em;line-height:1.5}
        .call-transcript .at{color:var(--orange-light)}
        .call-hangup{width:84px;height:84px;border-radius:50%;border:none;background:transparent;cursor:pointer;transition:all .2s;box-shadow:0 0 30px rgba(239,68,68,0.3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:30px}
        .call-hangup:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(239,68,68,0.5)}
        .call-hangup img{width:84px;height:84px;object-fit:cover;border-radius:50%}
        .call-hangup:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(239,68,68,0.5)}
        .call-hangup img{width:84px;height:84px;object-fit:cover;border-radius:50%}
        .call-upload-btn{width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:1.5rem;color:var(--text2)}
        .call-upload-btn:hover{background:rgba(255,255,255,0.1);transform:scale(1.05)}
        .call-img-thumb{max-width:120px;max-height:90px;border-radius:8px;border:1px solid var(--border);margin:4px auto;display:block;cursor:pointer;transition:transform 0.2s}
        .call-img-thumb:hover{transform:scale(1.05)}
        /* Lightbox */
        .lightbox{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:pointer}
        .lightbox.active{display:flex}
        .lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,0.5)}
        .lightbox .lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;opacity:0.7;transition:opacity 0.2s}
        .lightbox .lb-close:hover{opacity:1}
        .clear-menu{display:none;position:absolute;top:52px;right:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:5px;z-index:30;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
        .clear-menu.show{display:block}
        .clear-menu button{display:block;width:100%;padding:7px 14px;background:transparent;border:none;color:var(--text2);font-size:0.8rem;cursor:pointer;border-radius:6px;text-align:left;font-family:inherit;white-space:nowrap}
        .clear-menu button:hover{background:rgba(255,255,255,0.05);color:var(--text1)}
        @media(max-width:700px){.app-wrap{width:100vw;height:100vh;height:100dvh;max-width:100%}.logo-panel{display:none}.app-card{border-radius:0;border:none}.msg-row{max-width:88%}.messages{padding:14px}.input-bar{padding:10px 12px}.header-avatar,.hdr-av-fb{width:48px;height:48px}.hdr-btn,.hdr-btn-call{width:48px;height:48px}.hdr-btn img,.hdr-btn-call img{width:48px;height:48px}.msg-av,.msg-av-fb{width:40px;height:40px}.send-btn{width:44px;height:44px}.send-btn img{width:44px;height:44px}}
        @media(min-width:1300px){.app-wrap{max-width:1400px}.logo-panel{width:500px}.lp-logo{width:850px!important}.logo-call-btn{width:425px}}
    </style>
</head>
<body>
<div class="app-wrap">
    <div class="logo-panel">
        <img src="/static/img/logo.png" class="lp-logo" onerror="this.style.display='none'">
    </div>
    <div class="app-card">
        <div class="header">
            <div class="header-left">
                <img src="/static/img/avatar.png" class="header-avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="hdr-av-fb" style="display:none">🔥</div>
                <div class="header-info"><div class="title">{{ app_name }}</div><div class="sub"><span class="dot"></span>{{ avatar_name }} · Online</div></div>
            </div>
            <div class="header-right">
                <button class="hdr-btn hdr-btn-call" id="callBtn" onclick="toggleCall()" title="Call"><img src="/static/img/icon-call.png" onerror="this.style.display='none';this.parentElement.innerHTML='📞'"></button>
                <button class="hdr-btn" onclick="toggleMenu()" title="Menu"><img src="/static/img/icon-menu.png" onerror="this.style.display='none';this.parentElement.innerHTML='⋮'"></button>
            </div>
            <div class="clear-menu" id="clearMenu">
                <button onclick="clearConversation();toggleMenu();">🗑 Clear conversation</button>
                <button onclick="window.location.href='/logout'">🚪 Sign out</button>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div id="imagePreview" style="display:none"></div>
        <div class="input-bar">
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(this)">
            <button class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Attach image">📎</button>
            <input type="text" class="text-input" id="textInput" placeholder="Message {{ avatar_name }}..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" title="Send"><img src="/static/img/icon-send.png" onerror="this.style.display='none';this.parentElement.innerHTML='➤'"></button>
        </div>
        <div class="call-overlay" id="callOverlay">
            <div class="caw" id="caw">
                <img src="/static/img/avatar.png" class="call-avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="call-av-fb" style="display:none">🔥</div>
            </div>
            <div class="call-name">{{ avatar_name }}</div>
            <div class="call-status" id="callStatus">Connecting...</div>
            <div class="call-timer" id="callTimer">0:00</div>
            <div id="callImagePreview" style="display:none;margin:8px auto;text-align:center;"></div>
            <div id="callUploadPreview" style="display:none;margin:4px auto;text-align:center;"></div>
            <div class="call-transcript" id="callTranscript"></div>
            <div style="display:flex;gap:16px;align-items:center;">
              <input type="file" id="callImageInput" accept="image/*" style="display:none" onchange="sendCallImage(this)">
              <button class="call-upload-btn" onclick="document.getElementById('callImageInput').click()" title="Send a photo">📎</button>
              <button class="call-hangup" onclick="endCall()"><img src="/static/img/icon-hangup.png" onerror="this.style.display='none';this.parentElement.innerHTML='📞'"></button>
            </div>
        </div>
    </div>
</div>
<script>
const AN="{{ avatar_name }}",STORAGE_KEY="echowix_history_{{ username|default('anon') }}";
let socket=null,audioCtx=null,inCall=false,callStream=null,callRec=null;
let timerInt=null,callSec=0,silTimer=null,chunks=[];
let aQueue=[],aPlaying=false,analyser=null,vadOn=false;
let currentAudioSrc=null,aiDoneSpeaking=false,interruptMon=false;
const SIL_THRESH=0.015,SIL_DUR=2500,INTERRUPT_THRESH=0.025;

document.addEventListener('DOMContentLoaded',()=>{
    initSocket();loadConversation();requestLocation();
    document.getElementById('textInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
});
function initSocket(){
    socket=io();
    socket.on('call_transcription',d=>{setTranscript(d.role,d.text);addMessage(d.role==='user'?'user':'ai',d.text);saveConversation();});
    socket.on('call_audio',d=>{setCallSt('speaking');playChunk(d.data);});
    socket.on('call_audio_end',()=>{aiDoneSpeaking=true;if(!aPlaying&&inCall){setCallSt('listening');startListen();}});
    socket.on('call_generated_image',d=>{
        if(d.urls&&d.urls.length>0){
            const prev=document.getElementById('callImagePreview');
            prev.style.display='block';
            let html='';
            d.urls.forEach(url=>{html+=`<img src="${url}" class="call-img-thumb" style="max-width:200px;max-height:200px;cursor:pointer;" onclick="openLightbox(this.src)">`;});
            prev.innerHTML=html;
            // Also add to chat messages
            d.urls.forEach(url=>{addMessage('ai','[generated an image]');
                const c=document.getElementById('messages'),lastRow=c.lastElementChild;
                if(lastRow){const bubble=lastRow.querySelector('.msg-bubble');if(bubble){bubble.innerHTML=`<img src="${url}" style="max-width:100%;border-radius:8px;cursor:pointer;" onclick="openLightbox(this.src)">`;}}
            });
        }
    });
    socket.on('call_auto_hangup',()=>{
        // Wait for audio to finish playing, then end call
        const waitEnd=setInterval(()=>{if(!aPlaying&&!aQueue.length){clearInterval(waitEnd);if(inCall)endCall();}},200);
    });
    socket.on('call_resume',()=>{if(inCall){setCallSt('listening');startListen();}});
    socket.on('call_error',d=>{console.error(d.error);if(inCall){setCallSt('listening');startListen();}});
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function ts(){return new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function aiAv(){return `<img src="/static/img/avatar.png" class="msg-av" onerror="this.outerHTML='<div class=\\'msg-av-fb\\'>🔥</div>'">`;}
function userAv(){return `<img src="/static/img/user-avatar.png" class="msg-av" onerror="this.outerHTML='<div class=\\'msg-av-fb\\' style=\\'background:linear-gradient(135deg,#6366f1,#3b82f6)\\'>👤</div>'">`;}
function bars(){return `<span class="abtn" onclick="playTTS(this)"><span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span></span>`;}
function addMessage(role,text){
    const c=document.getElementById('messages'),r=document.createElement('div');r.className=`msg-row ${role}`;
    r.innerHTML=`${role==='ai'?aiAv():userAv()}<div class="msg-body"><div class="msg-bubble">${esc(text)}${role==='ai'?bars():''}</div><div class="msg-meta">${ts()}</div></div>`;
    c.appendChild(r);c.scrollTop=c.scrollHeight;
}
function addTyping(){const c=document.getElementById('messages'),r=document.createElement('div');r.className='typing-row';r.id='typingRow';r.innerHTML=`${aiAv()}<div class="typing-dots"><span></span><span></span><span></span></div>`;c.appendChild(r);c.scrollTop=c.scrollHeight;}
function removeTyping(){const e=document.getElementById('typingRow');if(e)e.remove();}
function startStream(){removeTyping();const c=document.getElementById('messages'),r=document.createElement('div');r.className='msg-row ai';r.innerHTML=`${aiAv()}<div class="msg-body"><div class="msg-bubble" id="streamBubble"></div><div class="msg-meta">${ts()}</div></div>`;c.appendChild(r);c.scrollTop=c.scrollHeight;}
function appendStream(t){const b=document.getElementById('streamBubble');if(b){b.textContent+=t;document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;}}
function endStream(){const b=document.getElementById('streamBubble');if(b){b.innerHTML=esc(b.textContent)+bars();b.removeAttribute('id');}}
let pendingImage=null;
function previewImage(input){
    const file=input.files[0];if(!file)return;
    pendingImage=file;
    const reader=new FileReader();
    reader.onload=e=>{
        const prev=document.getElementById('imagePreview');
        prev.style.display='block';
        prev.innerHTML=`<div class="img-preview"><img src="${e.target.result}" onclick="openLightbox(this.src)"><button class="remove-img" onclick="clearImage()">✕</button></div>`;
    };
    reader.readAsDataURL(file);
}
function clearImage(){pendingImage=null;document.getElementById('imagePreview').style.display='none';document.getElementById('imagePreview').innerHTML='';document.getElementById('imageInput').value='';}
function sendMessage(){
    const input=document.getElementById('textInput'),text=input.value.trim();
    if(!text&&!pendingImage)return;
    const displayText=text||(pendingImage?'[sent an image]':'');
    addMessage('user',displayText);
    if(pendingImage){
        const prev=document.getElementById('imagePreview');
        // Show image thumbnail in user message
        const lastMsg=document.querySelector('.msg-row.user:last-of-type .msg-bubble');
        if(lastMsg&&prev.querySelector('img')){
            const imgEl=document.createElement('img');imgEl.src=prev.querySelector('img').src;imgEl.style.cssText='max-width:200px;max-height:150px;border-radius:8px;display:block;margin-top:6px;cursor:pointer;';
            imgEl.onclick=function(){openLightbox(this.src);};
            lastMsg.appendChild(imgEl);
        }
    }
    input.value='';addTyping();
    if(pendingImage){
        const fd=new FormData();fd.append('message',text);fd.append('image',pendingImage);
        clearImage();
        fetch('/api/chat',{method:'POST',credentials:'same-origin',body:fd})
        .then(res=>handleStream(res)).catch(()=>{removeTyping();addMessage('ai','[Connection error]');});
    } else {
        fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({message:text})})
        .then(res=>handleStream(res)).catch(()=>{removeTyping();addMessage('ai','[Connection error]');});
    }
}
function handleStream(res){
    if(!res.ok){removeTyping();addMessage('ai','[Error: '+res.status+']');return;}
    const reader=res.body.getReader(),dec=new TextDecoder();let started=false,buf='';
    function read(){reader.read().then(({done,value})=>{
        if(done){if(!started)removeTyping();endStream();saveConversation();return;}
        buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){if(!line.startsWith('data: '))continue;
            try{const d=JSON.parse(line.slice(6));
                if(d.text){
                    // Strip image and sound tags from display
                    let clean=d.text.replace(/\[SHOW_IMAGE:[^\]]+\]/g,'');
                    // Detect ambient sound commands
                    const soundMatch=clean.match(/\[PLAY_SOUND:\s*(\w+)\]/);
                    if(soundMatch){playAmbient(soundMatch[1].toLowerCase());clean=clean.replace(/\[PLAY_SOUND:[^\]]+\]/g,'');}
                    if(clean.includes('[STOP_SOUND]')){stopAmbient();clean=clean.replace(/\[STOP_SOUND\]/g,'');}
                    if(clean){if(!started){startStream();started=true;}appendStream(clean);}
                }
                if(d.images){
                    d.images.forEach(url=>{
                        const c=document.getElementById('messages'),r=document.createElement('div');
                        r.className='msg-row ai';
                        r.innerHTML=`${aiAv()}<div class="msg-body"><div class="msg-bubble"><img src="${url}" style="max-width:100%;border-radius:8px;margin:4px 0;cursor:pointer;" onclick="openLightbox(this.src)"></div><div class="msg-meta">${ts()}</div></div>`;
                        c.appendChild(r);c.scrollTop=c.scrollHeight;
                    });
                }
                if(d.error){removeTyping();addMessage('ai','[Error: '+d.error+']');}
            }catch(e){}}
        read();});}read();
}
function playTTS(el){
    const bubble=el.closest('.msg-bubble'),text=bubble.childNodes[0].textContent.trim();if(!text)return;
    el.classList.add('playing');
    fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({text})})
    .then(r=>r.blob()).then(blob=>{const a=new Audio(URL.createObjectURL(blob));a.onended=()=>el.classList.remove('playing');a.onerror=()=>el.classList.remove('playing');a.play();
    }).catch(()=>el.classList.remove('playing'));
}
function toggleCall(){if(inCall)endCall();else startCallFn();}
async function startCallFn(){
    try{callStream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){alert('Microphone access denied. Voice calls require HTTPS — use the Cloudflare tunnel URL from your phone.');return;}
    await loadCallPhrases();
    inCall=true;callSec=0;silenceNudgeCount=0;
    document.getElementById('callBtn').classList.add('active');
    document.getElementById('callOverlay').classList.add('active');
    document.getElementById('callTranscript').innerHTML='';
    updTimer();timerInt=setInterval(()=>{callSec++;updTimer();},1000);
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(callStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=512;src.connect(analyser);
    socket.emit('call_start');setCallSt('listening');startListen();startInterruptMonitor();
}
function endCall(){
    inCall=false;vadOn=false;stopInterruptMonitor();clearSilenceNudge();silenceNudgeCount=0;
    if(currentAudioSrc){try{currentAudioSrc.pause();currentAudioSrc.src='';}catch(e){}currentAudioSrc=null;}
    if(callRec&&callRec.state!=='inactive')callRec.stop();
    if(callStream){callStream.getTracks().forEach(t=>t.stop());callStream=null;}
    if(audioCtx){audioCtx.close();audioCtx=null;}
    if(timerInt){clearInterval(timerInt);timerInt=null;}
    if(silTimer){clearTimeout(silTimer);silTimer=null;}
    aQueue=[];aPlaying=false;
    document.getElementById('callBtn').classList.remove('active');
    document.getElementById('callOverlay').classList.remove('active');
    // Clear all images from call overlay
    const callImgPrev=document.getElementById('callImagePreview');
    if(callImgPrev){callImgPrev.style.display='none';callImgPrev.innerHTML='';}
    const callUploadPrev=document.getElementById('callUploadPreview');
    if(callUploadPrev){callUploadPrev.style.display='none';callUploadPrev.innerHTML='';}
    socket.emit('call_end');
}
function startListen(){
    if(!inCall||!callStream)return;
    startSilenceNudge();
    const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    callRec=new MediaRecorder(callStream,{mimeType:mime});chunks=[];
    callRec.ondataavailable=e=>chunks.push(e.data);
    callRec.onstop=()=>{
        if(!inCall)return;if(!chunks.length){if(inCall)startListen();return;}
        const blob=new Blob(chunks,{type:mime}),reader=new FileReader();
        reader.onloadend=()=>{setCallSt('thinking');socket.emit('call_utterance',{audio:reader.result.split(',')[1]});};
        reader.readAsDataURL(blob);
    };
    callRec.start();vadOn=true;monVAD();
}
function monVAD(){
    if(!vadOn||!analyser)return;
    const data=new Float32Array(analyser.fftSize);let speaking=false,silStart=null;
    function chk(){
        if(!vadOn)return;analyser.getFloatTimeDomainData(data);
        let sum=0;for(let i=0;i<data.length;i++)sum+=data[i]*data[i];
        const rms=Math.sqrt(sum/data.length);
        if(rms>SIL_THRESH){speaking=true;silStart=null;clearSilenceNudge();silenceNudgeCount=0;if(silTimer){clearTimeout(silTimer);silTimer=null;}}
        else if(speaking&&!silStart){silStart=Date.now();silTimer=setTimeout(()=>{speaking=false;silStart=null;vadOn=false;if(callRec&&callRec.state==='recording')callRec.stop();},SIL_DUR);}
        if(vadOn)requestAnimationFrame(chk);
    }
    requestAnimationFrame(chk);
}
function setCallSt(s){
    const w=document.getElementById('caw'),st=document.getElementById('callStatus');
    w.className='caw '+s;st.className='call-status '+s;
    st.textContent=s==='listening'?'Listening...':s==='thinking'?'Thinking...':s==='speaking'?`${AN} is speaking...`:'Connecting...';
}
function setTranscript(role,text){
    const el=document.getElementById('callTranscript');
    if(role==='user')el.innerHTML=`<div>"${esc(text)}"</div>`;
    else el.innerHTML=`<div class="at">${esc(text)}</div>`;
}
function updTimer(){const m=Math.floor(callSec/60),s=callSec%60;document.getElementById('callTimer').textContent=`${m}:${s<10?'0'+s:s}`;}
const SENTENCE_PAUSE_MS=400;
const SILENCE_NUDGE_MS=10000;
let silenceNudgeTimer=null;
let silenceNudgeCount=0;
const DEFAULT_NUDGES=["you still there?","hello?","I can hear you breathing...","hey... you good?","you thinking or did I lose you?","...you fall asleep on me?"];
const DEFAULT_HANGUPS=["I think you disappeared on me... call me back when you want to talk.","alright, I think I lost you. I'm here whenever.","hey, I'm gonna let you go. Hit me up later.","looks like you're gone... talk soon, love you.","alright, guess you bounced. I'll be around.","I'll be here when you get back. Later."];
let userNudges=null;
let userHangups=null;
async function loadCallPhrases(){
    try{const r=await fetch('/api/call_phrases',{credentials:'same-origin'});const d=await r.json();userNudges=d.nudges||null;userHangups=d.hangups||null;}catch(e){userNudges=null;userHangups=null;}
}
function pickNudge(){const list=userNudges||DEFAULT_NUDGES;return list[Math.floor(Math.random()*list.length)];}
function pickHangup(){const list=userHangups||DEFAULT_HANGUPS;return list[Math.floor(Math.random()*list.length)];}
function startSilenceNudge(){
    clearSilenceNudge();
    silenceNudgeTimer=setTimeout(()=>{
        if(!inCall||aPlaying||aQueue.length>0)return;
        silenceNudgeCount++;
        if(silenceNudgeCount>=2){
            const hangup=pickHangup();
            socket.emit('call_utterance',{audio:null,nudge:hangup,auto_hangup:true});
            setCallSt('thinking');
        }else{
            const nudge=pickNudge();
            socket.emit('call_utterance',{audio:null,nudge:nudge});
            setCallSt('thinking');
        }
    },SILENCE_NUDGE_MS);
}
function clearSilenceNudge(){if(silenceNudgeTimer){clearTimeout(silenceNudgeTimer);silenceNudgeTimer=null;}}
function playChunk(b64){aiDoneSpeaking=false;aQueue.push(b64);if(!aPlaying)playNext();}
function playNext(){
    if(!aQueue.length){aPlaying=false;currentAudioSrc=null;if(aiDoneSpeaking&&inCall){setCallSt('listening');startListen();}return;}aPlaying=true;
    const bytes=Uint8Array.from(atob(aQueue.shift()),c=>c.charCodeAt(0));
    const blob=new Blob([bytes],{type:'audio/mpeg'});const url=URL.createObjectURL(blob);
    const audio=new Audio(url);currentAudioSrc=audio;
    const onDone=()=>{URL.revokeObjectURL(url);currentAudioSrc=null;if(aQueue.length){setTimeout(()=>playNext(),SENTENCE_PAUSE_MS);}else{playNext();}};
    audio.onended=onDone;
    audio.onerror=()=>{URL.revokeObjectURL(url);currentAudioSrc=null;playNext();};
    audio.play().catch(()=>{currentAudioSrc=null;playNext();});
}
function stopPlayback(){
    aQueue=[];aPlaying=false;aiDoneSpeaking=false;
    if(currentAudioSrc){try{currentAudioSrc.pause();currentAudioSrc.src='';}catch(e){}currentAudioSrc=null;}
    socket.emit('call_interrupt');
}
function startInterruptMonitor(){
    // Disabled — too sensitive, picks up keystrokes and ambient noise
    return;
}
function stopInterruptMonitor(){interruptMon=false;}
function sendCallImage(input){
    const file=input.files[0];if(!file||!inCall)return;
    const reader=new FileReader();
    reader.onload=e=>{
        const b64=e.target.result.split(',')[1];
        const mime=file.type||'image/jpeg';
        // Show thumbnail in call (upload preview area, clears on call end)
        const prev=document.getElementById('callUploadPreview');
        prev.style.display='block';
        prev.innerHTML=`<img src="${e.target.result}" class="call-img-thumb" onclick="openLightbox(this.src)">`;
        // Show in transcript
        setTranscript('user','[sent a photo]');
        addMessage('user','[sent a photo]');
        setCallSt('thinking');
        socket.emit('call_image',{image:b64,mime:mime});
    };
    reader.readAsDataURL(file);
    input.value='';
}
function saveConversation(){
    const msgs=[];document.querySelectorAll('.msg-row').forEach(r=>{
        const role=r.classList.contains('user')?'user':'assistant',b=r.querySelector('.msg-bubble');
        if(b)msgs.push({role,content:b.childNodes[0].textContent.trim()});
    });localStorage.setItem(STORAGE_KEY,JSON.stringify(msgs.slice(-40)));
}
function loadConversation(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');for(const m of s)addMessage(m.role==='assistant'?'ai':'user',m.content);}catch(e){}}
function clearConversation(){localStorage.removeItem(STORAGE_KEY);document.getElementById('messages').innerHTML='';clearImage();fetch('/api/clear',{method:'POST',credentials:'same-origin'}).catch(()=>{});}
function toggleMenu(){document.getElementById('clearMenu').classList.toggle('show');}
document.addEventListener('click',e=>{if(!e.target.closest('.hdr-btn')&&!e.target.closest('.clear-menu'))document.getElementById('clearMenu').classList.remove('show');});

// ---- LOCATION ----
function requestLocation(){
    if(!navigator.geolocation)return;
    navigator.geolocation.getCurrentPosition(pos=>{
        fetch('/api/location',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
            body:JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude})
        }).catch(()=>{});
    },()=>{},{enableHighAccuracy:false,timeout:10000,maximumAge:300000});
}

// ---- AMBIENT AUDIO ----
let ambientAudio=null,ambientSounds={};
fetch('/api/ambient',{credentials:'same-origin'}).then(r=>r.json()).then(d=>{ambientSounds=d;}).catch(()=>{});
function playAmbient(name){
    stopAmbient();
    const url=ambientSounds[name];if(!url)return;
    ambientAudio=new Audio(url);ambientAudio.loop=true;ambientAudio.volume=0.3;ambientAudio.play().catch(()=>{});
    addMessage('ai','🎵 Playing '+name+' sounds... say "stop" to turn off.');
    saveConversation();
}
function stopAmbient(){if(ambientAudio){ambientAudio.pause();ambientAudio.src='';ambientAudio=null;}}

// ---- LIGHTBOX ----
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');document.getElementById('lightboxImg').src='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>

    <span class="lb-close">✕</span>
    <img id="lightboxImg" src="" onclick="event.stopPropagation();">
</div>
