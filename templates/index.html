<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Voice Chat</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #060714;
            --bg-card: #0d1025;
            --bg-card-hover: #141833;
            --border: #1a1f3d;
            --border-active: #2563eb;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.3);
            --blue-glow-bright: rgba(59, 130, 246, 0.6);
            --orange: #f97316;
            --orange-glow: rgba(249, 115, 22, 0.3);
            --orange-glow-bright: rgba(249, 115, 22, 0.6);
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-card) 0%, var(--bg-dark) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-attachment: fixed;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(6, 7, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.25rem;
            gap: 0.5rem;
        }

        .toggle-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .toggle-btn.active {
            background: var(--blue);
            color: white;
            box-shadow: 0 0 20px var(--blue-glow-bright);
        }

        .toggle-btn:hover:not(.active) {
            color: var(--text-primary);
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1rem;
        }

        /* Chat Interface */
        .chat-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            height: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px var(--blue-glow);
        }

        .chat-container.active {
            display: flex;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--border-active);
            color: var(--text-primary);
        }

        .message.ai .message-content {
            background: var(--bg-card-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .ai-icon {
            font-size: 1.2rem;
            min-width: 1.2rem;
            margin-top: 0.1rem;
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.75rem 1rem;
        }

        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: var(--orange);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* Chat Input */
        .chat-input-area {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card-hover);
            display: flex;
            gap: 0.75rem;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 15px var(--blue-glow);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--blue-glow);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--blue-glow-bright);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Voice Interface */
        .voice-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            height: 100%;
            align-items: center;
            justify-content: center;
            gap: 3rem;
        }

        .voice-container.active {
            display: flex;
        }

        .mic-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--blue);
            background: rgba(59, 130, 246, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: all 0.2s ease;
            box-shadow: 0 0 30px var(--blue-glow);
            user-select: none;
        }

        .mic-button:hover:not(.recording):not(.processing) {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--blue-glow-bright);
        }

        .mic-button.recording {
            border-color: var(--orange);
            background: rgba(249, 115, 22, 0.1);
            box-shadow: 0 0 40px var(--orange-glow-bright);
            animation: pulse-recording 0.6s ease-in-out infinite;
        }

        @keyframes pulse-recording {
            0% {
                box-shadow: 0 0 20px var(--orange-glow-bright), 0 0 0 0 var(--orange-glow-bright);
            }
            100% {
                box-shadow: 0 0 20px var(--orange-glow-bright), 0 0 0 40px rgba(249, 115, 22, 0);
            }
        }

        .mic-button.processing {
            border-color: var(--blue);
            animation: pulse-processing 1s linear infinite;
        }

        @keyframes pulse-processing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .mic-button.playing {
            border-color: var(--orange);
            animation: pulse-playing 0.8s ease-in-out infinite;
        }

        @keyframes pulse-playing {
            0%, 100% {
                box-shadow: 0 0 20px var(--orange-glow);
            }
            50% {
                box-shadow: 0 0 40px var(--orange-glow-bright);
            }
        }

        .mic-label {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .transcription-area {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .transcript-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            border-left: 4px solid var(--blue);
        }

        .transcript-item.ai {
            border-left-color: var(--orange);
        }

        .transcript-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .transcript-text {
            color: var(--text-primary);
            line-height: 1.5;
        }

        .transcript-text.muted {
            color: var(--text-secondary);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-active);
        }

        /* Utilities */
        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-bar {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .chat-container {
                max-width: 100%;
                height: calc(100vh - 150px);
            }

            .voice-container {
                max-width: 100%;
            }

            .message-content {
                max-width: 90%;
            }

            .mic-button {
                width: 120px;
                height: 120px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="app-title">🔮 {{ app_name }}</div>
        <div class="mode-toggle">
            <button class="toggle-btn active" id="chatModeBtn" onclick="switchMode('chat')">Chat</button>
            <button class="toggle-btn" id="voiceModeBtn" onclick="switchMode('voice')">Voice</button>
        </div>
    </div>

    <div class="container">
        <!-- Chat Interface -->
        <div class="chat-container active" id="chatInterface">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="chat-input-area">
                <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="Say something..."
                    autocomplete="off"
                />
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Voice Interface -->
        <div class="voice-container" id="voiceInterface">
            <div style="text-align: center;">
                <div class="mic-button" id="micButton">🎤</div>
                <div class="mic-label" id="micLabel">Hold to speak</div>
            </div>
            <div class="transcription-area" id="transcriptionArea"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            chatApiUrl: '/api/chat',
            ttsApiUrl: '/api/tts',
            currentMode: 'chat',
            maxMessages: 50
        };

        // State
        let conversationHistory = [];
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let socket = null;
        let audioContext = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            initAudio();
            attachEventListeners();
            loadConversation();
        });

        // Socket.io initialization
        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Connected to server');
            });

            socket.on('connected', (data) => {
                console.log('Session ID:', data.session_id);
            });

            socket.on('transcription', (data) => {
                console.log('Transcription:', data.text);
                addTranscript('user', data.text);
            });

            socket.on('ai_response_text', (data) => {
                console.log('AI Response:', data.text);
                addTranscript('ai', data.text);
            });

            socket.on('audio_chunk', (data) => {
                playAudioChunk(data.data);
            });

            socket.on('audio_end', () => {
                console.log('Audio playback complete');
                document.getElementById('micButton').classList.remove('playing', 'processing');
                document.getElementById('micButton').classList.add('idle');
            });

            socket.on('voice_error', (data) => {
                console.error('Voice error:', data.error);
                document.getElementById('micButton').classList.remove('recording', 'processing');
                alert('Voice error: ' + data.error);
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
            });
        }

        // Audio initialization
        function initAudio() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
        }

        // Event listeners
        function attachEventListeners() {
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const micButton = document.getElementById('micButton');

            // Chat input
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Mic button
            micButton.addEventListener('mousedown', startRecording);
            micButton.addEventListener('mouseup', stopRecording);
            micButton.addEventListener('touchstart', startRecording);
            micButton.addEventListener('touchend', stopRecording);
        }

        // Mode switching
        function switchMode(mode) {
            CONFIG.currentMode = mode;

            // Update UI
            document.getElementById('chatInterface').classList.toggle('active', mode === 'chat');
            document.getElementById('voiceInterface').classList.toggle('active', mode === 'voice');

            document.getElementById('chatModeBtn').classList.toggle('active', mode === 'chat');
            document.getElementById('voiceModeBtn').classList.toggle('active', mode === 'voice');

            // Focus appropriate input
            if (mode === 'chat') {
                document.getElementById('chatInput').focus();
            }
        }

        // Chat mode
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message to UI
            addMessageToChat('user', message);
            conversationHistory.push({ role: 'user', content: message });
            input.value = '';

            // Add typing indicator
            addTypingIndicator();

            // Send to server (SSE streaming)
            fetch(CONFIG.chatApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
                .then((response) => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';

                    const read = () => {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                removeTypingIndicator();
                                conversationHistory.push({ role: 'assistant', content: fullText });
                                saveConversation();
                                return;
                            }

                            const chunk = decoder.decode(value);
                            const lines = chunk.split('\n');

                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    const data = JSON.parse(line.slice(6));

                                    if (data.text) {
                                        fullText += data.text;
                                        updateLastMessage(data.text);
                                    }

                                    if (data.error) {
                                        console.error('Chat error:', data.error);
                                        updateLastMessage(`[Error: ${data.error}]`);
                                    }
                                }
                            }

                            read();
                        });
                    };

                    read();
                })
                .catch((err) => {
                    console.error('Chat error:', err);
                    removeTypingIndicator();
                });
        }

        function addMessageToChat(role, content) {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';

            if (role === 'ai') {
                contentEl.innerHTML = `<div class="ai-icon">🤖</div><div>${content}</div>`;
            } else {
                contentEl.textContent = content;
            }

            messageEl.appendChild(contentEl);
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = 'message ai typing-indicator';
            messageEl.id = 'typingIndicator';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                messageEl.appendChild(dot);
            }

            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function updateLastMessage(text) {
            const container = document.getElementById('messagesContainer');
            const lastMessage = container.querySelector('.message.ai:not(.typing-indicator)');

            if (lastMessage) {
                const contentEl = lastMessage.querySelector('div:last-child');
                contentEl.textContent += text;
            }
        }

        // Voice mode
        async function startRecording() {
            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm')
                    ? 'audio/webm'
                    : 'audio/mp4';

                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];

                mediaRecorder.addEventListener('dataavailable', (e) => {
                    audioChunks.push(e.data);
                });

                mediaRecorder.addEventListener('stop', sendVoiceData);

                mediaRecorder.start();
                isRecording = true;

                const micButton = document.getElementById('micButton');
                micButton.classList.add('recording');
                micButton.classList.remove('idle');
                document.getElementById('micLabel').textContent = 'Recording...';

                socket.emit('voice_start');
            } catch (err) {
                console.error('Mic access error:', err);
                alert('Microphone access denied');
            }
        }

        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;

            mediaRecorder.stop();
            isRecording = false;

            const micButton = document.getElementById('micButton');
            micButton.classList.remove('recording');
            micButton.classList.add('processing');
            document.getElementById('micLabel').textContent = 'Processing...';
        }

        async function sendVoiceData() {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();

            reader.addEventListener('loadend', () => {
                const base64Audio = reader.result.split(',')[1];
                socket.emit('voice_data', { audio: base64Audio });
            });

            reader.readAsDataURL(blob);
        }

        function addTranscript(role, text) {
            const area = document.getElementById('transcriptionArea');
            const item = document.createElement('div');
            item.className = `transcript-item ${role}`;

            const label = document.createElement('div');
            label.className = 'transcript-label';
            label.textContent = role === 'user' ? '📝 You said:' : '🤖 AI says:';

            const textEl = document.createElement('div');
            textEl.className = 'transcript-text';
            textEl.textContent = text;

            item.appendChild(label);
            item.appendChild(textEl);
            area.appendChild(item);
        }

        let audioQueue = [];
        let isPlayingAudio = false;

        function playAudioChunk(base64Data) {
            audioQueue.push(base64Data);

            if (!isPlayingAudio) {
                playNextAudioChunk();
            }
        }

        function playNextAudioChunk() {
            if (audioQueue.length === 0) {
                isPlayingAudio = false;
                return;
            }

            isPlayingAudio = true;
            const base64Data = audioQueue.shift();

            // Decode base64
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Decode MP3
            audioContext.decodeAudioData(
                bytes.buffer,
                (audioBuffer) => {
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);

                    source.onended = playNextAudioChunk;

                    const micButton = document.getElementById('micButton');
                    if (!micButton.classList.contains('playing')) {
                        micButton.classList.add('playing');
                    }

                    source.start(0);
                },
                (err) => {
                    console.error('Audio decode error:', err);
                    playNextAudioChunk();
                }
            );
        }

        // Conversation persistence
        function saveConversation() {
            localStorage.setItem('conversation', JSON.stringify(conversationHistory));
        }

        function loadConversation() {
            const saved = localStorage.getItem('conversation');
            if (saved) {
                conversationHistory = JSON.parse(saved);
                // Display conversation
                for (const msg of conversationHistory) {
                    addMessageToChat(msg.role, msg.content);
                }
            }
        }

        function clearConversation() {
            conversationHistory = [];
            localStorage.removeItem('conversation');
            document.getElementById('messagesContainer').innerHTML = '';
        }
    </script>
</body>
</html>
