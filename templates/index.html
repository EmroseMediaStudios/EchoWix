<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="apple-touch-icon" href="/static/img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#080b1a;--bg2:#0c1028;--bg3:#111638;--glass:rgba(12,16,40,0.65);--glass-border:rgba(59,130,246,0.15);--border:#1a1f3d;--text1:#e2e8f0;--text2:#94a3b8;--text3:#475569;--blue:#3b82f6;--blue-light:#60a5fa;--blue-glow:rgba(59,130,246,0.25);--blue-glow2:rgba(59,130,246,0.5);--orange:#f97316;--orange-light:#fb923c;--orange-glow:rgba(249,115,22,0.25);--orange-glow2:rgba(249,115,22,0.5);--red:#ef4444;--green:#22c55e;--user-bubble:rgba(59,130,246,0.12);--user-border:rgba(59,130,246,0.25);--ai-bubble:rgba(20,24,51,0.8);--ai-border:rgba(30,35,70,0.8)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:120%;height:60%;background:radial-gradient(ellipse at center,rgba(59,130,246,0.06) 0%,transparent 60%);pointer-events:none}
        body::after{content:'';position:fixed;bottom:-10%;left:50%;transform:translateX(-50%);width:80%;height:40%;background:radial-gradient(ellipse at center,rgba(249,115,22,0.04) 0%,transparent 60%);pointer-events:none}
        .app-card{position:relative;z-index:1;width:95vw;max-width:680px;height:92vh;height:92dvh;display:flex;flex-direction:column;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 0 60px rgba(59,130,246,0.08),0 0 120px rgba(249,115,22,0.04),inset 0 1px 0 rgba(255,255,255,0.04);overflow:hidden}
        .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--glass-border);background:rgba(8,11,26,0.5);flex-shrink:0;position:relative}
        .header-left{display:flex;align-items:center;gap:12px}
        .header-avatar{width:36px;height:36px;border-radius:10px;object-fit:cover;border:1px solid var(--glass-border)}
        .hdr-av-fb{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
        .header-title{font-size:1.15rem;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--text1),var(--blue-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .header-sub{font-size:0.72rem;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:6px}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(34,197,94,0.5)}
        .header-right{display:flex;gap:8px}
        .hdr-btn{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;overflow:hidden}
        .btn-call{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
        .btn-call:hover{box-shadow:0 0 20px rgba(34,197,94,0.4);transform:scale(1.05)}
        .btn-call.active{background:linear-gradient(135deg,var(--red),#dc2626)}
        .btn-call.active:hover{box-shadow:0 0 20px rgba(239,68,68,0.4)}
        .btn-menu{background:linear-gradient(135deg,var(--orange),#ea580c);color:#fff}
        .btn-menu:hover{box-shadow:0 0 20px var(--orange-glow2);transform:scale(1.05)}
        .hdr-btn:has(img){background:transparent}
        .hdr-btn:has(img):hover{background:rgba(255,255,255,0.05)}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
        .messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .msg-row{display:flex;gap:10px;max-width:85%;animation:mi 0.3s ease}
        .msg-row.ai{align-self:flex-start}.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
        @keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg-av{width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;margin-top:2px}
        .msg-av-fb{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
        .msg-body{display:flex;flex-direction:column;gap:4px}
        .msg-bubble{padding:10px 14px;border-radius:14px;font-size:0.9rem;line-height:1.55;word-wrap:break-word}
        .msg-row.ai .msg-bubble{background:var(--ai-bubble);border:1px solid var(--ai-border);border-top-left-radius:4px}
        .msg-row.user .msg-bubble{background:var(--user-bubble);border:1px solid var(--user-border);border-top-right-radius:4px}
        .msg-meta{font-size:0.68rem;color:var(--text3);padding:0 4px}.msg-row.user .msg-meta{text-align:right}
        .abtn{display:inline-flex;align-items:center;gap:2px;margin-left:8px;cursor:pointer;opacity:0.4;transition:opacity 0.2s;vertical-align:middle}
        .abtn:hover{opacity:1}.abtn .b{width:3px;border-radius:2px;background:var(--orange);display:inline-block}
        .abtn .b:nth-child(1){height:8px}.abtn .b:nth-child(2){height:14px}.abtn .b:nth-child(3){height:10px}.abtn .b:nth-child(4){height:16px}.abtn .b:nth-child(5){height:8px}
        .abtn.playing .b{animation:bp .5s ease-in-out infinite alternate}
        .abtn.playing .b:nth-child(2){animation-delay:.08s}.abtn.playing .b:nth-child(3){animation-delay:.16s}.abtn.playing .b:nth-child(4){animation-delay:.24s}.abtn.playing .b:nth-child(5){animation-delay:.32s}
        @keyframes bp{from{transform:scaleY(.5)}to{transform:scaleY(1.3)}}
        .typing-row{display:flex;gap:10px;align-self:flex-start}
        .typing-dots{display:flex;gap:4px;padding:12px 16px;background:var(--ai-bubble);border:1px solid var(--ai-border);border-radius:14px;border-top-left-radius:4px}
        .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:db 1.4s ease-in-out infinite}
        .typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
        @keyframes db{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-6px)}}
        .center-logo{display:flex;align-items:center;justify-content:center;padding:12px 0;flex-shrink:0;pointer-events:none;opacity:0.9;transition:opacity .4s,max-height .4s;max-height:180px;overflow:hidden}
        .center-logo.hidden{opacity:0;max-height:0;padding:0}
        .center-logo img{max-height:140px;width:auto;filter:drop-shadow(0 0 30px rgba(59,130,246,0.2)) drop-shadow(0 0 60px rgba(249,115,22,0.15))}
        .logo-fb{font-size:64px;filter:drop-shadow(0 0 20px rgba(249,115,22,0.4))}
        .call-overlay{display:none;position:absolute;inset:0;z-index:20;background:rgba(6,7,20,0.92);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:24px}
        .call-overlay.active{display:flex}
        .call-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--blue);box-shadow:0 0 40px var(--blue-glow)}
        .call-av-fb{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:48px;border:3px solid var(--blue);box-shadow:0 0 40px var(--blue-glow)}
        .call-name{font-size:1.5rem;font-weight:700;color:var(--text1)}
        .call-status{font-size:0.85rem;color:var(--text2)}
        .call-status.listening{color:var(--green)}.call-status.thinking{color:var(--blue-light)}.call-status.speaking{color:var(--orange)}
        .call-timer{font-size:0.78rem;color:var(--text3);font-variant-numeric:tabular-nums}
        .caw{position:relative}.caw::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;transition:all .3s}
        .caw.listening::after{border-color:var(--green);box-shadow:0 0 20px rgba(34,197,94,0.3)}
        .caw.speaking::after{border-color:var(--orange);box-shadow:0 0 20px var(--orange-glow);animation:cp 1s ease-in-out infinite}
        .caw.thinking::after{border-color:var(--blue);box-shadow:0 0 20px var(--blue-glow)}
        @keyframes cp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .call-transcript{max-width:80%;text-align:center;font-size:0.85rem;color:var(--text2);min-height:2.5em;line-height:1.5}
        .call-transcript .at{color:var(--orange-light)}
        .call-hangup{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;font-size:24px;cursor:pointer;transition:all .2s;box-shadow:0 0 30px rgba(239,68,68,0.3)}
        .call-hangup:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(239,68,68,0.5)}
        .input-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid var(--glass-border);background:rgba(8,11,26,0.6);flex-shrink:0}
        .text-input{flex:1;background:rgba(17,22,56,0.6);border:1px solid var(--border);color:var(--text1);padding:10px 14px;border-radius:20px;font-size:0.9rem;font-family:inherit;outline:none;transition:all .2s}
        .text-input:focus{border-color:rgba(59,130,246,0.4);box-shadow:0 0 12px var(--blue-glow)}
        .text-input::placeholder{color:var(--text3)}
        .send-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--text3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .send-btn:hover{color:var(--blue);background:rgba(59,130,246,0.1)}
        .clear-menu{display:none;position:absolute;top:60px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:6px;z-index:30;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
        .clear-menu.show{display:block}
        .clear-menu button{display:block;width:100%;padding:8px 16px;background:transparent;border:none;color:var(--text2);font-size:0.82rem;cursor:pointer;border-radius:6px;text-align:left;font-family:inherit}
        .clear-menu button:hover{background:rgba(239,68,68,0.1);color:var(--red)}
        .btn-icon{width:36px;height:36px;object-fit:cover;border-radius:10px}
        .btn-icon-lg{width:64px;height:64px;object-fit:cover;border-radius:50%}
        .menu-icon{width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:4px}
        @media(max-width:700px){.app-card{width:100vw;height:100vh;height:100dvh;border-radius:0;border:none}.center-logo img{max-height:100px}}
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <div class="header-left">
            <img src="/static/img/avatar.png" class="header-avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="hdr-av-fb" style="display:none">🔥</div>
            <div><div class="header-title">{{ avatar_name }}</div><div class="header-sub"><span class="dot"></span>{{ app_name }} · Online</div></div>
        </div>
        <div class="header-right">
            <button class="hdr-btn btn-call" id="callBtn" onclick="toggleCall()" title="Start call"><img src="/static/img/icon-call.png" class="btn-icon" onerror="this.style.display='none';this.parentElement.textContent='📞'"></button>
            <button class="hdr-btn btn-menu" onclick="toggleMenu()" title="Options"><img src="/static/img/icon-menu.png" class="btn-icon" onerror="this.style.display='none';this.parentElement.textContent='⚡'"></button>
        </div>
        <div class="clear-menu" id="clearMenu"><button onclick="clearConversation();toggleMenu();"><img src="/static/img/icon-clear.png" class="menu-icon" onerror="this.style.display='none'"> Clear conversation</button><button onclick="window.location.href='/logout'">🚪 Sign out</button></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="center-logo" id="centerLogo">
        <img src="/static/img/logo.png" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="logo-fb" style="display:none">🔥</div>
    </div>
    <div class="input-bar">
        <input type="text" class="text-input" id="textInput" placeholder="Message {{ avatar_name }}..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()" title="Send"><img src="/static/img/icon-send.png" class="btn-icon" onerror="this.style.display='none';this.parentElement.textContent='➤'"></button>
    </div>
    <div class="call-overlay" id="callOverlay">
        <div class="caw" id="caw">
            <img src="/static/img/avatar.png" class="call-avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="call-av-fb" style="display:none">🔥</div>
        </div>
        <div class="call-name">{{ avatar_name }}</div>
        <div class="call-status" id="callStatus">Connecting...</div>
        <div class="call-timer" id="callTimer">0:00</div>
        <div class="call-transcript" id="callTranscript"></div>
        <button class="call-hangup" onclick="endCall()"><img src="/static/img/icon-hangup.png" class="btn-icon-lg" onerror="this.style.display='none';this.parentElement.textContent='📞'"></button>
    </div>
</div>
<script>
const AN="{{ avatar_name }}";
const STORAGE_KEY="echowix_history_{{ username|default('anon') }}";
let socket=null,audioCtx=null,inCall=false,callStream=null,callRec=null;
let timerInt=null,callSec=0,silTimer=null,chunks=[];
let aQueue=[],aPlaying=false,analyser=null,vadOn=false;
let currentAudioSrc=null; // Track current playing audio source for interruption
let aiDoneSpeaking=false,interruptMon=false;
const SIL_THRESH=0.015,SIL_DUR=1500,INTERRUPT_THRESH=0.025;

document.addEventListener('DOMContentLoaded',()=>{
    initSocket();loadConversation();
    document.getElementById('textInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
});

function initSocket(){
    socket=io();
    socket.on('call_transcription',d=>{setTranscript(d.role,d.text);addMessage(d.role==='user'?'user':'ai',d.text);saveConversation();});
    socket.on('call_audio',d=>{setCallSt('speaking');playChunk(d.data);monInterrupt();});
    socket.on('call_audio_end',()=>{aiDoneSpeaking=true;if(!aPlaying&&inCall){setCallSt('listening');startListen();}});
    socket.on('call_resume',()=>{if(inCall){setCallSt('listening');startListen();}});
    socket.on('call_error',d=>{console.error(d.error);if(inCall){setCallSt('listening');startListen();}});
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function ts(){return new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function checkLogo(){document.getElementById('centerLogo').classList.toggle('hidden',document.getElementById('messages').children.length>0);}
function aiAv(){return `<img src="/static/img/avatar.png" class="msg-av" onerror="this.outerHTML='<div class=\\'msg-av-fb\\'>🔥</div>'">`;}
function userAv(){return `<img src="/static/img/user-avatar.png" class="msg-av" onerror="this.outerHTML='<div class=\\'msg-av-fb\\' style=\\'background:linear-gradient(135deg,#6366f1,#3b82f6)\\'>👤</div>'">`;}
function bars(){return `<span class="abtn" onclick="playTTS(this)"><span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span></span>`;}

function addMessage(role,text){
    const c=document.getElementById('messages'),r=document.createElement('div');r.className=`msg-row ${role}`;
    r.innerHTML=`${role==='ai'?aiAv():userAv()}<div class="msg-body"><div class="msg-bubble">${esc(text)}${role==='ai'?bars():''}</div><div class="msg-meta">${ts()}</div></div>`;
    c.appendChild(r);c.scrollTop=c.scrollHeight;checkLogo();
}
function addTyping(){const c=document.getElementById('messages'),r=document.createElement('div');r.className='typing-row';r.id='typingRow';r.innerHTML=`${aiAv()}<div class="typing-dots"><span></span><span></span><span></span></div>`;c.appendChild(r);c.scrollTop=c.scrollHeight;}
function removeTyping(){const e=document.getElementById('typingRow');if(e)e.remove();}
function startStream(){removeTyping();const c=document.getElementById('messages'),r=document.createElement('div');r.className='msg-row ai';r.innerHTML=`${aiAv()}<div class="msg-body"><div class="msg-bubble" id="streamBubble"></div><div class="msg-meta">${ts()}</div></div>`;c.appendChild(r);c.scrollTop=c.scrollHeight;checkLogo();}
function appendStream(t){const b=document.getElementById('streamBubble');if(b){b.textContent+=t;document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;}}
function endStream(){const b=document.getElementById('streamBubble');if(b){b.innerHTML=esc(b.textContent)+bars();b.removeAttribute('id');}}

function sendMessage(){
    const input=document.getElementById('textInput'),text=input.value.trim();if(!text)return;
    addMessage('user',text);input.value='';addTyping();
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({message:text})})
    .then(res=>{
        if(!res.ok){removeTyping();addMessage('ai','[Error: '+res.status+']');return;}
        const reader=res.body.getReader(),dec=new TextDecoder();let started=false,buf='';
        function read(){reader.read().then(({done,value})=>{
            if(done){if(!started)removeTyping();endStream();saveConversation();return;}
            buf+=dec.decode(value,{stream:true});
            const lines=buf.split('\n');buf=lines.pop();
            for(const line of lines){if(!line.startsWith('data: '))continue;
                try{const d=JSON.parse(line.slice(6));if(d.text){if(!started){startStream();started=true;}appendStream(d.text);}if(d.error){removeTyping();addMessage('ai','[Error: '+d.error+']');}}catch(e){}}
            read();});}read();
    }).catch(e=>{removeTyping();addMessage('ai','[Connection error: '+e.message+']');});
}

function playTTS(el){
    const bubble=el.closest('.msg-bubble'),text=bubble.childNodes[0].textContent.trim();if(!text)return;
    el.classList.add('playing');
    fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
    .then(r=>r.blob()).then(blob=>{const a=new Audio(URL.createObjectURL(blob));a.onended=()=>el.classList.remove('playing');a.onerror=()=>el.classList.remove('playing');a.play();
    }).catch(()=>el.classList.remove('playing'));
}

// ---- LIVE CALL ----
function toggleCall(){if(inCall)endCall();else startCallFn();}

async function startCallFn(){
    try{callStream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){console.error('Mic denied');return;}
    inCall=true;callSec=0;
    document.getElementById('callBtn').classList.add('active');
    document.getElementById('callOverlay').classList.add('active');
    document.getElementById('callTranscript').innerHTML='';
    updTimer();timerInt=setInterval(()=>{callSec++;updTimer();},1000);
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(callStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=512;src.connect(analyser);
    socket.emit('call_start');setCallSt('listening');startListen();
}

function endCall(){
    inCall=false;vadOn=false;interruptMon=false;
    if(currentAudioSrc){try{currentAudioSrc.stop();}catch(e){}currentAudioSrc=null;}
    if(callRec&&callRec.state!=='inactive')callRec.stop();
    if(callStream){callStream.getTracks().forEach(t=>t.stop());callStream=null;}
    if(audioCtx){audioCtx.close();audioCtx=null;}
    if(timerInt){clearInterval(timerInt);timerInt=null;}
    if(silTimer){clearTimeout(silTimer);silTimer=null;}
    aQueue=[];aPlaying=false;
    document.getElementById('callBtn').classList.remove('active');
    document.getElementById('callOverlay').classList.remove('active');
    socket.emit('call_end');
}

function startListen(){
    if(!inCall||!callStream)return;
    const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    callRec=new MediaRecorder(callStream,{mimeType:mime});chunks=[];
    callRec.ondataavailable=e=>chunks.push(e.data);
    callRec.onstop=()=>{
        if(!inCall)return;
        if(!chunks.length){if(inCall)startListen();return;}
        const blob=new Blob(chunks,{type:mime}),reader=new FileReader();
        reader.onloadend=()=>{setCallSt('thinking');socket.emit('call_utterance',{audio:reader.result.split(',')[1]});};
        reader.readAsDataURL(blob);
    };
    callRec.start();vadOn=true;monVAD();
}

function monVAD(){
    if(!vadOn||!analyser)return;
    const data=new Float32Array(analyser.fftSize);let speaking=false,silStart=null;
    function chk(){
        if(!vadOn)return;analyser.getFloatTimeDomainData(data);
        let sum=0;for(let i=0;i<data.length;i++)sum+=data[i]*data[i];
        const rms=Math.sqrt(sum/data.length);
        if(rms>SIL_THRESH){speaking=true;silStart=null;if(silTimer){clearTimeout(silTimer);silTimer=null;}}
        else if(speaking&&!silStart){silStart=Date.now();silTimer=setTimeout(()=>{speaking=false;silStart=null;vadOn=false;if(callRec&&callRec.state==='recording')callRec.stop();},SIL_DUR);}
        if(vadOn)requestAnimationFrame(chk);
    }
    requestAnimationFrame(chk);
}

function setCallSt(s){
    const w=document.getElementById('caw'),st=document.getElementById('callStatus');
    w.className='caw '+s;st.className='call-status '+s;
    st.textContent=s==='listening'?'Listening...':s==='thinking'?'Thinking...':s==='speaking'?`${AN} is speaking...`:'Connecting...';
}
function setTranscript(role,text){
    const el=document.getElementById('callTranscript');
    if(role==='user')el.innerHTML=`<div>"${esc(text)}"</div>`;
    else el.innerHTML=`<div class="at">${esc(text)}</div>`;
}
function updTimer(){const m=Math.floor(callSec/60),s=callSec%60;document.getElementById('callTimer').textContent=`${m}:${s<10?'0'+s:s}`;}

// WebSocket audio playback
function playChunk(b64){aiDoneSpeaking=false;aQueue.push(b64);if(!aPlaying)playNext();}
function playNext(){
    if(!aQueue.length){aPlaying=false;currentAudioSrc=null;if(aiDoneSpeaking&&inCall){setCallSt('listening');startListen();}return;}aPlaying=true;
    const bytes=Uint8Array.from(atob(aQueue.shift()),c=>c.charCodeAt(0));
    const blob=new Blob([bytes],{type:'audio/mpeg'});
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    currentAudioSrc=audio;
    audio.onended=()=>{URL.revokeObjectURL(url);currentAudioSrc=null;playNext();};
    audio.onerror=()=>{URL.revokeObjectURL(url);currentAudioSrc=null;playNext();};
    audio.play().catch(()=>{currentAudioSrc=null;playNext();});
}
function stopPlayback(){
    aQueue=[];aPlaying=false;aiDoneSpeaking=false;interruptMon=false;
    if(currentAudioSrc){try{currentAudioSrc.pause();currentAudioSrc.src='';}catch(e){}currentAudioSrc=null;}
    socket.emit('call_interrupt');
}
function monInterrupt(){
    if(interruptMon||!analyser||!inCall)return;interruptMon=true;
    const data=new Float32Array(analyser.fftSize);let hitCount=0;
    function chk(){
        if(!interruptMon||!inCall||!aPlaying)return;
        analyser.getFloatTimeDomainData(data);
        let sum=0;for(let i=0;i<data.length;i++)sum+=data[i]*data[i];
        const rms=Math.sqrt(sum/data.length);
        if(rms>INTERRUPT_THRESH){hitCount++;if(hitCount>3){stopPlayback();setCallSt('listening');startListen();return;}}else{hitCount=Math.max(0,hitCount-1);}
        requestAnimationFrame(chk);
    }
    requestAnimationFrame(chk);
}

// Persistence
function saveConversation(){
    const msgs=[];document.querySelectorAll('.msg-row').forEach(r=>{
        const role=r.classList.contains('user')?'user':'assistant',b=r.querySelector('.msg-bubble');
        if(b)msgs.push({role,content:b.childNodes[0].textContent.trim()});
    });localStorage.setItem(STORAGE_KEY,JSON.stringify(msgs.slice(-40)));
}
function loadConversation(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');for(const m of s)addMessage(m.role==='assistant'?'ai':'user',m.content);}catch(e){}}
function clearConversation(){localStorage.removeItem(STORAGE_KEY);document.getElementById('messages').innerHTML='';checkLogo();fetch('/api/clear',{method:'POST',credentials:'same-origin'}).catch(()=>{});}
function toggleMenu(){document.getElementById('clearMenu').classList.toggle('show');}
document.addEventListener('click',e=>{if(!e.target.closest('.btn-menu')&&!e.target.closest('.clear-menu'))document.getElementById('clearMenu').classList.remove('show');});
</script>
