<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <link rel="apple-touch-icon" href="/static/img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#080b1a;--bg2:#0c1028;--bg3:#111638;--glass:rgba(12,16,40,0.65);--glass-border:rgba(59,130,246,0.15);--border:#1a1f3d;--text1:#e2e8f0;--text2:#94a3b8;--text3:#475569;--blue:#3b82f6;--blue-light:#60a5fa;--blue-glow:rgba(59,130,246,0.25);--orange:#f97316;--orange-glow:rgba(249,115,22,0.25);--red:#ef4444;--green:#22c55e}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:120%;height:60%;background:radial-gradient(ellipse at center,rgba(59,130,246,0.06) 0%,transparent 60%);pointer-events:none}
        body::after{content:'';position:fixed;bottom:-10%;left:50%;transform:translateX(-50%);width:80%;height:40%;background:radial-gradient(ellipse at center,rgba(249,115,22,0.04) 0%,transparent 60%);pointer-events:none}
        .login-card{position:relative;z-index:1;width:90vw;max-width:420px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 0 60px rgba(59,130,246,0.08),0 0 120px rgba(249,115,22,0.04),inset 0 1px 0 rgba(255,255,255,0.04);padding:40px 32px;display:flex;flex-direction:column;align-items:center;gap:28px}
        .login-logo{max-height:120px;width:auto;filter:drop-shadow(0 0 30px rgba(59,130,246,0.2)) drop-shadow(0 0 60px rgba(249,115,22,0.15))}
        .login-logo-fb{font-size:72px;filter:drop-shadow(0 0 20px rgba(249,115,22,0.4))}
        .login-title{font-size:1.5rem;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--text1),var(--blue-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .login-sub{font-size:0.82rem;color:var(--text3);margin-top:-16px}
        .login-form{width:100%;display:flex;flex-direction:column;gap:14px}
        .login-input{width:100%;background:rgba(17,22,56,0.6);border:1px solid var(--border);color:var(--text1);padding:12px 16px;border-radius:12px;font-size:0.92rem;font-family:inherit;outline:none;transition:all 0.2s}
        .login-input:focus{border-color:rgba(59,130,246,0.4);box-shadow:0 0 12px var(--blue-glow)}
        .login-input::placeholder{color:var(--text3)}
        .login-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-size:0.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px}
        .login-btn:hover{box-shadow:0 0 24px var(--blue-glow);transform:translateY(-1px)}
        .login-btn:active{transform:translateY(0)}
        .login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .login-error{color:var(--red);font-size:0.82rem;text-align:center;min-height:1.2em}
        .login-footer{font-size:0.72rem;color:var(--text3)}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        .shake{animation:shake 0.3s ease}
    </style>
</head>
<body>
<div class="login-card" id="loginCard">
    <img src="/static/img/logo.png" class="login-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="login-logo-fb" style="display:none">🔥</div>
    <div class="login-title">{{ app_name }}</div>
    <div class="login-sub">Sign in to continue</div>
    <form class="login-form" id="loginForm" onsubmit="return doLogin(event)">
        <input type="text" class="login-input" id="username" name="username" placeholder="Username" autocomplete="username" autocapitalize="none" required>
        <input type="password" class="login-input" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <div class="login-error" id="loginError">{% if error %}{{ error }}{% endif %}</div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
</div>
<script>
function doLogin(e){
    e.preventDefault();
    const btn=document.getElementById('loginBtn'),err=document.getElementById('loginError');
    const u=document.getElementById('username').value.trim();
    const p=document.getElementById('password').value;
    if(!u||!p)return false;
    btn.disabled=true;btn.textContent='Signing in...';err.textContent='';
    fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({username:u,password:p})})
    .then(r=>r.json().then(d=>({ok:r.ok,data:d})))
    .then(({ok,data})=>{
        if(ok){window.location.href='/';}
        else{err.textContent=data.error||'Invalid credentials';document.getElementById('loginCard').classList.add('shake');setTimeout(()=>document.getElementById('loginCard').classList.remove('shake'),300);btn.disabled=false;btn.textContent='Sign In';}
    }).catch(()=>{err.textContent='Connection error';btn.disabled=false;btn.textContent='Sign In';});
    return false;
}
document.getElementById('username').focus();
</script>
</body>
</html>
